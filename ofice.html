<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Oficina</title>

<style>
body {
  font-family: "Georgia", serif;
  background: #eef3f8; /* fondo suave */
  margin: 0;
}

/* Título */
.titulo {
  text-align: center;
  font-size: 38px;
  padding: 20px;
  color: #2c3e50;
}

/* Contenedor */
.container {
  width: 90%;
  margin: auto;
  background: #ffffff;
  padding: 20px;
  border: 2px solid #c9d6e3;
  border-radius: 8px;
}

/* Inputs */
input, select {
  padding: 6px;
  margin: 6px;
  border: 1px solid #b0c4d4;
  border-radius: 4px;
  background: #f8fbff;
}

/* Botones */
button {
  background: #4a6fa5;
  color: white;
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  margin: 5px;
}

button:hover {
  background: #3a5c8a;
}

/* Tabla */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
}

th {
  background: #4a6fa5;
  color: white;
  padding: 8px;
}

td {
  border: 1px solid #d3dde6;
  padding: 6px;
  text-align: center;
}

tr:nth-child(even) {
  background: #f5f9fd;
}
</style>
</head>

<body>

<h1 class="titulo">Gestión de Oficina</h1>

<div class="container">

    <!-- MES -->
    <div>
        Mes:
        <select id="mes" onchange="cargarDatos()">
            <option value="enero">Enero</option>
            <option value="febrero">Febrero</option>
            <option value="marzo">Marzo</option>
            <option value="abril">Abril</option>
            <option value="mayo">Mayo</option>
            <option value="junio">Junio</option>
            <option value="julio">Julio</option>
            <option value="agosto">Agosto</option>
            <option value="septiembre">Septiembre</option>
            <option value="octubre">Octubre</option>
            <option value="noviembre">Noviembre</option>
            <option value="diciembre">Diciembre</option>
        </select>
    </div>

    <!-- SERVICIOS -->
    <div>
        Luz Total: <input type="number" id="luz" value="0">
        Agua Total: <input type="number" id="agua" value="0">
    </div>

    <!-- INGRESO -->
    <div>
        Nombre:
        <input type="text" id="nombre" placeholder="Escribir nombre...">
    </div>

    <!-- BOTONES -->
    <div>
        <button onclick="guardar()">Guardar</button>
        <button onclick="volverMenu()">Volver al Menú</button>
    </div>

</div>

<script>

// CARGAR DATOS (ejemplo)
function cargarDatos(){
  document.getElementById("luz").value = Math.floor(Math.random() * 100);
  document.getElementById("agua").value = Math.floor(Math.random() * 100);
}

// GUARDAR
function guardar(){
  alert("Datos guardados correctamente.");
}

// VOLVER
function volverMenu(){
  window.location.href = "menu.html";
}

</script>
<script>
// 🔥 SOLUCIÓN REAL DE FOCO PARA ELECTRON

function recuperarFoco() {
  let input = document.querySelector("input:focus");

  if (!input) {
    let primero = document.querySelector("input, select");
    if (primero) primero.focus();
  }
}

// cuando hacés click en cualquier lado
document.addEventListener("click", () => {
  setTimeout(recuperarFoco, 10);
});

// cuando cambia algo
document.addEventListener("change", () => {
  setTimeout(recuperarFoco, 10);
});

// cuando la ventana vuelve
window.addEventListener("focus", recuperarFoco);

// al cargar
window.addEventListener("load", recuperarFoco);
</script>
<script>
// 🔥 ARREGLA EL FOCO AUTOMÁTICAMENTE

document.addEventListener("click", () => {
  setTimeout(() => {
    let active = document.activeElement;

    if (!active || active === document.body) {
      let input = document.querySelector("input, select");
      if (input) input.focus();
    }
  }, 10);
});

// También al cargar
window.onload = () => {
  let input = document.querySelector("input, select");
  if (input) input.focus();
};
</script>
</body>
</html>
