<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso</title>

<style>
body {
  font-family: "Georgia", serif;
  background: linear-gradient(to bottom right, #eef3f8, #dce6f2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

/* CAJA */
.box {
  background: #ffffff;
  padding: 30px;
  border-radius: 12px;
  border: 2px solid #c9d6e3;
  width: 320px;
  text-align: center;
  box-shadow: 0 15px 30px rgba(0,0,0,0.08);
  animation: aparecer 0.8s ease;
}

/* TITULO */
h2 {
  color: #2c3e50;
  margin-bottom: 15px;
}

/* INPUTS */
input {
  display: block;
  margin: 10px auto;
  padding: 8px;
  width: 90%;
  border: 1px solid #b0c4d4;
  border-radius: 6px;
  background: #f8fbff;
}

/* BOTON */
button {
  background: #4a6fa5;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
  width: 95%;
  transition: 0.3s;
}

button:hover {
  background: #3a5c8a;
  transform: translateY(-2px);
}

/* LINK */
.link {
  margin-top: 10px;
  cursor: pointer;
  color: #4a6fa5;
  text-decoration: underline;
  font-size: 14px;
}

/* ERROR */
.error {
  color: red;
  font-size: 13px;
  margin-top: 5px;
}

/* ANIMACION */
@keyframes aparecer {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="box">

  <h2 id="titulo">Iniciar Sesión</h2>

  <!-- LOGIN -->
  <div id="loginBox">
    <input type="text" id="loginUser" placeholder="Usuario" oninput="limpiarError()">
    <input type="password" id="loginPass" placeholder="Contraseña" oninput="limpiarError()">
    
    <div id="error" class="error"></div>

    <button onclick="login()">Entrar</button>
    <div class="link" onclick="mostrarRegistro()">Crear cuenta</div>
  </div>

  <!-- REGISTRO -->
  <div id="registerBox" style="display:none;">
    <input type="text" id="regUser" placeholder="Usuario">
    <input type="password" id="regPass" placeholder="Contraseña">
    
    <button onclick="registrar()">Registrarse</button>
    <div class="link" onclick="mostrarLogin()">Ya tengo cuenta</div>
  </div>

</div>

<script>

// CAMBIAR VISTAS
function mostrarRegistro(){
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("registerBox").style.display = "block";
  document.getElementById("titulo").innerText = "Registro";
}

function mostrarLogin(){
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("registerBox").style.display = "none";
  document.getElementById("titulo").innerText = "Iniciar Sesión";
}

// REGISTRAR
function registrar(){
  let user = document.getElementById("regUser").value.trim();
  let pass = document.getElementById("regPass").value.trim();

  if(user === "" || pass === ""){
    alert("Completar datos");
    return;
  }

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {};

  if(usuarios[user]){
    alert("Usuario ya existe");
    return;
  }

  usuarios[user] = pass;

  localStorage.setItem("usuarios", JSON.stringify(usuarios));

  alert("Usuario registrado");
  mostrarLogin();
}

// LOGIN
function login(){
  let userInput = document.getElementById("loginUser");
  let passInput = document.getElementById("loginPass");
  let error = document.getElementById("error");

  let user = userInput.value.trim();
  let pass = passInput.value.trim();

  let usuarios = JSON.parse(localStorage.getItem("usuarios")) || {};

  if(usuarios[user] && usuarios[user] === pass){
    localStorage.setItem("usuarioActivo", user);
    window.location.href = "menu.html";
  } else {
    error.innerText = "Usuario o contraseña incorrectos";
    passInput.value = "";
    passInput.focus();
  }
}

// LIMPIAR ERROR
function limpiarError(){
  document.getElementById("error").innerText = "";
}

</script>
<script>
// 🔥 SOLUCIÓN REAL DE FOCO PARA ELECTRON

function recuperarFoco() {
  let input = document.querySelector("input:focus");

  if (!input) {
    let primero = document.querySelector("input, select");
    if (primero) primero.focus();
  }
}

// cuando hacés click en cualquier lado
document.addEventListener("click", () => {
  setTimeout(recuperarFoco, 10);
});

// cuando cambia algo
document.addEventListener("change", () => {
  setTimeout(recuperarFoco, 10);
});

// cuando la ventana vuelve
window.addEventListener("focus", recuperarFoco);

// al cargar
window.addEventListener("load", recuperarFoco);
</script>
</script>
</body>
</html>
